name: Build TunnelBI APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Inspect libbox.aar
        run: |
          cd app/libs
          unzip -o libbox.aar -d libbox_contents
          find libbox_contents -name "*.jar" | xargs -I{} jar tf {} | grep "\.class" | sed 's|/|.|g' | sed 's|\.class||g' | sort
