name: Build TunnelBI APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Inspect methods
        run: |
          cd app/libs
          unzip -o libbox.aar -d libbox_contents
          javap -classpath libbox_contents/classes.jar io.nekohasekai.libbox.RoutePrefix
          javap -classpath libbox_contents/classes.jar io.nekohasekai.libbox.StringBox
          javap -classpath libbox_contents/classes.jar io.nekohasekai.libbox.RoutePrefixIterator
