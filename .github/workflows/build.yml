name: Build libbox.aar

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sing-box stable
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: stable
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.8

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          local-cache: true
          add-to-path: true

      - name: Build libbox.aar
        run: |
          make lib_install
          export PATH="$PATH:$(go env GOPATH)/bin"
          go run ./cmd/internal/build_libbox --help || true

      - name: Upload libbox.aar
        uses: actions/upload-artifact@v4
        with:
          name: libbox-aar
          path: "**/*.aar"
          retention-days: 90
